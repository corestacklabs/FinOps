# =============================================================================
# SaaS -> FOCUS/CUR Converter  —  Project Configuration
# =============================================================================
#
# All paths are relative to the saas_to_focus_formatter/ working directory
# (the same directory this file lives in).
#
# Priority order (high → low):
#   CLI argument  >  this file  >  built-in code default
#
# Sections:
#   [paths]    Input/output file paths
#   [billing]  Billing metadata written into every FOCUS row
#   [mapper]   Mapper file paths and generation hints
#   [logging]  Log directory, retry count, resume behaviour
#
# Quick start — edit this file once, then just run:
#   python3 main.py generate          # generate mapper from CSV
#   python3 main.py transform         # convert CSV using mapper
#   python3 main.py run               # full pipeline (generate + transform)
#   python3 main.py run --resume      # re-run, skip already-done files
#   python3 main.py run --max_retries 3  # retry failed files up to 3 times
#
#   python3 main.py run --config /path/to/other.ini   # use a different config
#   python3 main.py run --usage_report ../other.csv   # override a single value
# =============================================================================


# -----------------------------------------------------------------------------
[paths]
# -----------------------------------------------------------------------------
#
# INPUT — uncomment the mode(s) you use:
#
#   usage_dir    Batch mode  — all *.csv in the folder, alphabetical order.
#                Used by `run` and `transform`.
#
#   usage_report Single file — one CSV at a time.
#                Used by `generate`.  Also used by `run`/`transform` when
#                usage_dir is not set.
#
# TIP: If only usage_dir is set, `generate` automatically picks the first
#      file alphabetically from that folder — no extra flags needed.
#
usage_dir    = ../usage_reports/
; usage_report  = ../usage_report.csv

# OUTPUT — match to the input mode above:
#
#   output_dir   Batch mode  — each file produces <stem>_focus_cur.csv here.
#   output       Single file — explicit output path.
#
output_dir   = ../focus_cur_outputs/
; output        = ../focus_cur_output.csv

# FOCUS/CUR schema template (defines output column order)
cur_template  = ../saas_template.csv


# -----------------------------------------------------------------------------
[billing]
# -----------------------------------------------------------------------------
# These values are written into every FOCUS output row.
# All can be overridden per-run with CLI flags (e.g. --provider_name "Acme").
provider_name        = Microsoft
billing_account_id   = d883b358-f7bd-543d-6e9d-c3fbb1c70e73:2e9cb5a7-7f86-4cd3-b52d-9255d17ba36e_2019-05-31
billing_account_name = CoreStack India Private Limited - Internal-IT
billing_currency     = USD
region_name          = global


# -----------------------------------------------------------------------------
[mapper]
# -----------------------------------------------------------------------------
#
# output_mapper  Where `generate` writes the new mapper JSON.
#                Default: mappers/<tool_name>_mapper.json
# output_mapper = mappers/copilot_mapper.json

# mapper         Mapper JSON used by `transform`.  REQUIRED for `transform`.
#                For `run`, the mapper is auto-detected/generated per file.
mapper = mappers/copilot_mapper.json

# Metadata hints passed to `generate` (auto-inferred from CSV if omitted).
tool_name      = Copilot
product_family = Developer Tools


# -----------------------------------------------------------------------------
[logging]
# -----------------------------------------------------------------------------
#
# log_dir      Directory (relative to saas_to_focus_formatter/) where two files
#              are written on every run:
#                latest.log       Full structured log, overwritten each run.
#                run_state.json   JSON checkpoint updated after every file.
#
# max_retries  How many times to retry a file that fails during processing.
#              1 = no retry (try once, move on if it fails).
#              3 = try up to 3 times before marking the file as failed.
#
# resume       Not a config key — use the --resume CLI flag to skip files
#              that already have status=done in the last run_state.json.
#
log_dir     = logs
max_retries = 1


# -----------------------------------------------------------------------------
[s3]
# -----------------------------------------------------------------------------
#
# Optional AWS S3 upload destination.
#
# When `bucket` is set, every output CSV is uploaded to S3 immediately after
# it is written locally.  Both local and S3 destinations are active at the
# same time — the local file is always kept.
# S3 upload failures are non-fatal — a warning is logged and the run continues.
#
# =============================================================================
# SETUP — one-time steps before enabling S3
# =============================================================================
#
# Step 1 — Install boto3 (only needed for S3; core pipeline needs no packages)
#   pip install boto3
#
# Step 2 — Configure AWS credentials (choose ONE method; never put keys here)
#
#   Method A  Environment variables  (best for CI/CD, Docker, cron jobs)
#   -----------------------------------------------------------------------
#   export AWS_ACCESS_KEY_ID=AKIA...
#   export AWS_SECRET_ACCESS_KEY=abc123...
#   export AWS_DEFAULT_REGION=us-east-1   # optional if region is set below
#
#   Method B  AWS CLI / shared credentials file  (best for local dev)
#   -----------------------------------------------------------------------
#   Run once:  aws configure
#   This writes ~/.aws/credentials with a [default] profile.
#   To use a named profile instead of [default], set `profile` below.
#
#   Manual edit of ~/.aws/credentials:
#     [default]
#     aws_access_key_id     = AKIA...
#     aws_secret_access_key = abc123...
#
#     [finops-prod]
#     aws_access_key_id     = AKIA...
#     aws_secret_access_key = xyz789...
#
#   Method C  IAM Instance Role / ECS Task Role / AWS SSO  (best for AWS infra)
#   -----------------------------------------------------------------------
#   No credentials needed — boto3 picks up the attached role automatically.
#   Just set bucket (and optionally prefix/region) below.
#
# =============================================================================
# CONFIGURATION KEYS
# =============================================================================
#
# bucket   S3 bucket name                            (required to enable S3)
# prefix   Key prefix (folder path) within bucket    (optional; e.g. focus-cur/)
#          Uploaded key = prefix/filename
#          Example: prefix=focus-cur-outputs/ + file=copilot_jan_focus_cur.csv
#                   → s3://my-bucket/focus-cur-outputs/copilot_jan_focus_cur.csv
# region   AWS region where the bucket lives         (optional; uses AWS_DEFAULT_REGION
#          env var or the profile's configured region if omitted)
# profile  Named profile from ~/.aws/credentials     (optional; uses [default] if omitted)
#
; bucket  = zabbixserver-dbbackup
; prefix  = test/
; region  = us-east-1
; profile = default
